<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Gift Bot - Card Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #8B9DC3; min-height: 100vh; display: flex; justify-content: center; padding: 40px 16px; }
  .phone { width: 375px; }
  .card { background: #fff; border-radius: 16px; overflow: hidden; margin-bottom: 20px; }
  .card-body { padding: 16px; }
  .label { font-size: 13px; color: #999; }
  .description { font-size: 18px; font-weight: bold; color: #111; margin-top: 4px; }
  .date { font-size: 12px; color: #bbb; margin-top: 4px; }
  .weather-main { display: flex; align-items: center; margin-top: 16px; }
  .weather-left { flex: 1; }
  .temp-big { font-size: 48px; font-weight: bold; color: #111; }
  .location { font-size: 14px; color: #111; margin-top: 8px; }
  .temp-range { font-size: 12px; color: #999; margin-top: 4px; }
  .weather-emoji { font-size: 64px; }
  .separator { height: 1px; background: #E8E8E8; margin: 16px 0; }
  .hourly { display: flex; gap: 0; }
  .hourly-item { flex: 1; text-align: center; }
  .hourly-time { font-size: 11px; color: #999; }
  .hourly-icon { font-size: 20px; margin: 4px 0; }
  .hourly-temp { font-size: 13px; color: #111; font-weight: bold; }
  .recommend-msg { font-size: 14px; color: #333; margin-bottom: 8px; }
  .product { display: flex; align-items: center; background: #F0F0F0; border-radius: 8px; padding: 12px; margin-top: 8px; }
  .product-info { flex: 1; }
  .product-name { font-size: 14px; color: #111; font-weight: bold; }
  .product-price { font-size: 12px; color: #999; margin-top: 4px; }
  .product-btn { font-size: 13px; color: #000; cursor: pointer; white-space: nowrap; }
  .card-footer { padding: 0 16px 16px; }
  .footer-btn { display: block; text-align: center; background: #A5FF05; color: #111; font-size: 14px; font-weight: bold; padding: 12px; border-radius: 8px; text-decoration: none; }
  h3 { color: #fff; margin-bottom: 12px; font-size: 14px; opacity: 0.8; }
</style>
</head>
<body>
<div class="phone">
  <h3>Weather Gift Bot — 흐린 날 카드</h3>
  <div class="card">
    <div class="card-body">
      <div class="label">Weather</div>
      <div class="description">흐림</div>
      <div class="date">3월 13일 오후 02:40</div>

      <div class="weather-main">
        <div class="weather-left">
          <div class="temp-big">18°</div>
          <div class="location">📍 Taipei</div>
          <div class="temp-range">22° / 16°  💧 78%</div>
        </div>
        <div class="weather-emoji">☁️</div>
      </div>

      <div class="separator"></div>

      <div class="hourly">
        <div class="hourly-item">
          <div class="hourly-time">3PM</div>
          <div class="hourly-icon">☁</div>
          <div class="hourly-temp">18°</div>
        </div>
        <div class="hourly-item">
          <div class="hourly-time">4PM</div>
          <div class="hourly-icon">☁</div>
          <div class="hourly-temp">17°</div>
        </div>
        <div class="hourly-item">
          <div class="hourly-time">5PM</div>
          <div class="hourly-icon">☁</div>
          <div class="hourly-temp">17°</div>
        </div>
        <div class="hourly-item">
          <div class="hourly-time">6PM</div>
          <div class="hourly-icon">🌧</div>
          <div class="hourly-temp">16°</div>
        </div>
        <div class="hourly-item">
          <div class="hourly-time">7PM</div>
          <div class="hourly-icon">🌧</div>
          <div class="hourly-temp">16°</div>
        </div>
      </div>

      <div class="separator"></div>

      <div class="recommend-msg">흐린 날엔 따뜻한 차 한 잔 어때요? ☁️</div>

      <div class="product">
        <div class="product-info">
          <div class="product-name">綜合花茶禮</div>
          <div class="product-price">NT$ 505</div>
        </div>
        <div class="product-btn">선물하기</div>
      </div>

      <div class="product">
        <div class="product-info">
          <div class="product-name">黑糖薑茶/黑糖桂圓禮盒</div>
          <div class="product-price">NT$ 359</div>
        </div>
        <div class="product-btn">선물하기</div>
      </div>

      <div class="product">
        <div class="product-info">
          <div class="product-name">咖啡點心組</div>
          <div class="product-price">NT$ 549</div>
        </div>
        <div class="product-btn">선물하기</div>
      </div>
    </div>
    <div class="card-footer">
      <a href="#" class="footer-btn">기프트샵 더보기</a>
    </div>
  </div>
</div>
</body>
</html>
