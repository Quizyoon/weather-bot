<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Gift Bot - Card Preview</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #8B9DC3; min-height: 100vh; display: flex; justify-content: center; padding: 40px 16px; }
  .phone { width: 300px; }
  .card { background: #fff; border-radius: 16px; overflow: hidden; }
  .card-body { padding: 16px; }
  .label { font-size: 12px; color: #999; font-weight: bold; }
  .description { font-size: 16px; font-weight: bold; color: #111; margin-top: 4px; }
  .date { font-size: 11px; color: #bbb; margin-top: 4px; }
  .weather-main { display: flex; align-items: center; margin-top: 16px; }
  .weather-left { flex: 1; }
  .temp-big { font-size: 55px; font-weight: bold; color: #111; line-height: 1; }
  .location { font-size: 12px; color: #111; margin-top: 8px; font-weight: bold; }
  .temp-range { font-size: 12px; color: #999; margin-top: 4px; }
  .weather-emoji { font-size: 55px; }
  .hourly { display: flex; margin-top: 16px; }
  .hourly-item { flex: 1; text-align: center; }
  .hourly-time { font-size: 12px; color: #999; }
  .hourly-icon { font-size: 20px; margin: 4px 0; }
  .hourly-temp { font-size: 12px; color: #111; font-weight: bold; }
  .recommend-msg { font-size: 14px; color: #333; margin-top: 16px; }
  .product { display: flex; align-items: center; background: #F0F0F0; border-radius: 8px; padding: 12px; margin-top: 8px; }
  .product-info { flex: 1; }
  .product-name { font-size: 14px; color: #111; font-weight: bold; }
  .product-price { font-size: 12px; color: #999; margin-top: 4px; }
  .product-btn { font-size: 13px; color: #000; cursor: pointer; white-space: nowrap; }
  .card-footer { padding: 0 16px 16px; }
  .footer-btn { display: flex; align-items: center; justify-content: center; background: #A5FF05; color: #111; font-size: 13px; font-weight: bold; height: 35px; border-radius: 8px; text-decoration: none; }
  h3 { color: #fff; margin-bottom: 12px; font-size: 14px; opacity: 0.8; }
</style>
</head>
<body>
<div class="phone">
  <h3>Weather Gift Bot — Cloudy Day</h3>
  <div class="card">
    <div class="card-body">
      <div class="label">Weather</div>
      <div class="description">Cloudy</div>
      <div class="date">Mar 13, 02:40 PM</div>

      <div class="weather-main">
        <div class="weather-left">
          <div class="temp-big">18°</div>
          <div class="location">📍 Taipei</div>
          <div class="temp-range"><span style="color:#000000">22°</span> / 16°  <span style="color:#96B2FF">💧 78%</span></div>
        </div>
        <div class="weather-emoji">☁️</div>
      </div>

      <div class="hourly">
        <div class="hourly-item">
          <div class="hourly-time">3PM</div>
          <div class="hourly-icon">☁</div>
          <div class="hourly-temp">18°</div>
        </div>
        <div class="hourly-item">
          <div class="hourly-time">4PM</div>
          <div class="hourly-icon">☁</div>
          <div class="hourly-temp">17°</div>
        </div>
        <div class="hourly-item">
          <div class="hourly-time">5PM</div>
          <div class="hourly-icon">☁</div>
          <div class="hourly-temp">17°</div>
        </div>
        <div class="hourly-item">
          <div class="hourly-time">6PM</div>
          <div class="hourly-icon">🌧</div>
          <div class="hourly-temp">16°</div>
        </div>
        <div class="hourly-item">
          <div class="hourly-time">7PM</div>
          <div class="hourly-icon">🌧</div>
          <div class="hourly-temp">16°</div>
        </div>
      </div>

      <hr style="border:none; border-top:1px solid #E5E5E5; margin-top:16px;">

      <div class="recommend-msg">Cloudy day — a warm cup of tea sounds perfect ☁️</div>

      <div class="product">
        <div class="product-info">
          <div class="product-name">綜合花茶禮</div>
          <div class="product-price">NT$ 505</div>
        </div>
        <div class="product-btn">Send Gift</div>
      </div>

      <div class="product">
        <div class="product-info">
          <div class="product-name">黑糖薑茶/黑糖桂圓禮盒</div>
          <div class="product-price">NT$ 359</div>
        </div>
        <div class="product-btn">Send Gift</div>
      </div>

      <div class="product">
        <div class="product-info">
          <div class="product-name">咖啡點心組</div>
          <div class="product-price">NT$ 549</div>
        </div>
        <div class="product-btn">Send Gift</div>
      </div>
    </div>
    <div class="card-footer">
      <a href="#" class="footer-btn">More Gifts</a>
    </div>
  </div>
</div>
</body>
</html>
